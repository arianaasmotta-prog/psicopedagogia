<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onde Está? — Jogo de Preposições de Lugar</title>
<style>
  :root{
    --roxo:#7c5cff;
    --roxo-escuro:#5b3fd6;
    --laranja:#ff9a52;
    --laranja-escuro:#f2762a;
    --verde:#3ecf8e;
    --vermelho:#ff6b6b;
    --creme:#fff8ef;
    --texto:#3a3350;
    --sombra: 0 6px 18px rgba(90,60,20,.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
    background: linear-gradient(160deg,#fff3e0 0%, #ffe6d5 40%, #e7f6ff 100%);
    color:var(--texto);
    padding:18px;
  }
  .app{
    max-width:880px;
    margin:0 auto;
    background:var(--creme);
    border-radius:28px;
    box-shadow:var(--sombra);
    padding:22px 24px 28px;
    position:relative;
    overflow:hidden;
  }
  .app::before{
    content:"";
    position:absolute; top:-60px; right:-60px;
    width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle, #ffd7a8 0%, transparent 70%);
  }
  h1{
    text-align:center;
    font-size:1.7rem;
    color:var(--roxo-escuro);
    margin:4px 0 2px;
  }
  .subtitulo{
    text-align:center;
    color:#8a7f9e;
    font-size:.95rem;
    margin-bottom:18px;
  }
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap; gap:8px;
    margin-bottom:14px;
  }
  .chip{
    background:white;
    border-radius:999px;
    padding:6px 14px;
    font-size:.85rem;
    font-weight:bold;
    color:var(--roxo-escuro);
    box-shadow:var(--sombra);
  }
  .btn{
    border:none;
    border-radius:16px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    font-family:inherit;
    transition: transform .12s ease, box-shadow .12s ease;
    box-shadow:var(--sombra);
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(0px) scale(.98);}
  .btn-primario{background:var(--roxo); color:white;}
  .btn-primario:hover{background:var(--roxo-escuro);}
  .btn-secundario{background:white;color:var(--roxo-escuro); border:2px solid var(--roxo);}
  .btn-laranja{background:var(--laranja); color:white;}
  .btn-laranja:hover{background:var(--laranja-escuro);}
  .btn:disabled{opacity:.55; cursor:default; transform:none;}

  /* MENU */
  .cartoes-menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:10px;
  }
  @media(max-width:640px){.cartoes-menu{grid-template-columns:1fr;}}
  .cartao-fase{
    background:white;
    border-radius:22px;
    padding:22px 18px;
    text-align:center;
    box-shadow:var(--sombra);
    border:3px solid transparent;
    cursor:pointer;
    transition:.15s;
  }
  .cartao-fase:hover{border-color:var(--roxo); transform:translateY(-3px);}
  .cartao-fase .emoji-grande{font-size:2.8rem;display:block;margin-bottom:8px;}
  .cartao-fase h3{margin:4px 0 6px;color:var(--roxo-escuro);}
  .cartao-fase p{font-size:.88rem;color:#786d90;margin:0;}

  /* SELEÇÃO DE TEMPO */
  .tempos{
    display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:22px 0;
  }
  .tempo-btn{
    background:white;border-radius:18px;padding:20px 26px;
    box-shadow:var(--sombra); cursor:pointer; border:3px solid transparent;
    text-align:center; min-width:110px;
  }
  .tempo-btn:hover{border-color:var(--laranja);}
  .tempo-btn.selecionado{border-color:var(--roxo); background:#f1ecff;}
  .tempo-btn .num{font-size:1.7rem;font-weight:bold;color:var(--roxo-escuro);display:block;}

  /* CENA / SALA */
  .cena-titulo{
    text-align:center; font-size:1.2rem; font-weight:bold; color:var(--laranja-escuro);
    margin:6px 0 12px;
  }
  .scene-room{
    position:relative;
    width:100%;
    max-width:640px;
    aspect-ratio: 4/3;
    border-radius:22px;
    overflow:hidden;
    border:6px solid white;
    box-shadow:var(--sombra);
    margin:0 auto;
  }
  .scene-svg{
    position:absolute; top:0; left:0; width:100%; height:100%; z-index:2;
  }
  .sprite-inner{
    transform-box: fill-box;
    transform-origin: center;
  }
  .scene-foto{
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .scene-blocked{
    width:100%; aspect-ratio:4/3; max-height:400px;
    border-radius:22px; border:6px solid white; box-shadow:var(--sombra);
    background:linear-gradient(135deg,#e6dcff,#ffe3d0);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; text-align:center; padding:20px;
  }
  .scene-blocked .emoji-grande{font-size:3rem;}
  .scene-blocked p{margin:0;color:#786d90;font-weight:bold;}

  /* TIMER */
  .timer-wrap{
    text-align:center; margin:14px 0 6px;
  }
  .timer-num{
    font-size:2.4rem; font-weight:bold; color:var(--roxo-escuro);
  }
  .barra-tempo{
    width:100%; max-width:400px; height:12px; background:#eee2ff;
    border-radius:20px; margin:8px auto 0; overflow:hidden;
  }
  .barra-tempo-fill{
    height:100%; background:linear-gradient(90deg,var(--laranja),var(--roxo));
    border-radius:20px; transition:width 1s linear;
  }

  /* QUESTÃO */
  .caixa-pergunta{
    background:white; border-radius:20px; padding:18px 20px; margin-top:18px;
    box-shadow:var(--sombra);
  }
  .progresso{
    font-size:.8rem; color:#a596c2; font-weight:bold; margin-bottom:8px; text-align:center;
  }
  .frase{
    font-size:1.15rem; text-align:center; margin-bottom:16px; line-height:1.5;
  }
  .lacuna{
    display:inline-block; min-width:90px; border-bottom:3px solid var(--roxo);
    font-weight:bold; color:var(--roxo-escuro); padding:0 4px;
  }
  .lacuna.certo{color:var(--verde); border-color:var(--verde);}
  .lacuna.errado{color:var(--vermelho); border-color:var(--vermelho);}
  .opcoes{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  @media(max-width:480px){.opcoes{grid-template-columns:1fr;}}
  .opcao{
    background:#f3eeff; border:2px solid #ddd0ff; border-radius:14px;
    padding:12px; font-size:1rem; font-weight:bold; color:var(--roxo-escuro);
    cursor:pointer; transition:.12s;
  }
  .opcao:hover:not(:disabled){background:#e4d9ff; transform:translateY(-2px);}
  .opcao.certa{background:var(--verde); border-color:#2bb377; color:white;}
  .opcao.errada{background:var(--vermelho); border-color:#e14f4f; color:white;}
  .opcao:disabled{cursor:default;}
  .rodape-pergunta{
    display:flex; justify-content:center; margin-top:16px; min-height:44px;
  }

  /* RESULTADOS */
  .resultado{
    text-align:center; padding:20px 10px;
  }
  .resultado .emoji-grande{font-size:3.4rem;}
  .resultado h2{color:var(--roxo-escuro); margin:8px 0 4px;}
  .resultado .placar{font-size:1.4rem; font-weight:bold; margin:10px 0 4px; color:var(--laranja-escuro);}
  .resultado .mensagem{color:#786d90; margin-bottom:18px;}
  .acoes-final{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}

  .voltar-menu{
    display:block; text-align:center; margin-top:16px; font-size:.85rem; color:#a596c2;
    cursor:pointer; text-decoration:underline;
  }
  .pular-espera{
    display:block; margin:10px auto 0; text-align:center; font-size:.82rem; color:#a596c2;
    cursor:pointer; text-decoration:underline; background:none; border:none;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ===================== BIBLIOTECA DE ILUSTRAÇÕES (SVG) ===================== */
const TRACO = '#332f45';
const S = 5;
function shade(hex, percent){
  hex = hex.replace('#','');
  let r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
  r = Math.min(255,Math.max(0, r + Math.round(255*(percent/100))));
  g = Math.min(255,Math.max(0, g + Math.round(255*(percent/100))));
  b = Math.min(255,Math.max(0, b + Math.round(255*(percent/100))));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function rr(x,y,w,h,r,fill,sw=S){ return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${fill}" stroke="${TRACO}" stroke-width="${sw}"/>`; }
function el(cx,cy,rx,ry,fill,sw=S){ return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fill}" stroke="${TRACO}" stroke-width="${sw}"/>`; }
function ci(cx,cy,r,fill,sw=S){ return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${TRACO}" stroke-width="${sw}"/>`; }
function ln(x1,y1,x2,y2,w=S){ return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${TRACO}" stroke-width="${w}" stroke-linecap="round"/>`; }
function pth(d,fill,sw=S){ return `<path d="${d}" fill="${fill}" stroke="${TRACO}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round"/>`; }
function sombra(cx,cy,rx,ry){ return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="#1a1730" opacity="0.14"/>`; }

  s+=rr(8,132,196,15,6,shade(cor,-55)); s+=el(72,80,26,18,'#ffffff'); s+=rr(88,90,118,48,16,shade(cor,-15));
  return {w,h,svg:s}; };

SPRITES.cachorro = ()=>{ const w=95,h=72; let s='';

SPRITES.carrinho = ()=>{ const w=100,h=55; let s='';
  s+=sombra(50,50,44,6); s+=pth('M8 40 L14 18 Q18 10 30 10 L70 10 Q80 10 84 20 L92 40 Z','#f2b544');
  s+=rr(28,16,34,14,4,'#bfe6f5'); s+=ci(26,42,11,'#33303f'); s+=ci(74,42,11,'#33303f');
  s+=ci(26,42,4,'#8a8a8a'); s+=ci(74,42,4,'#8a8a8a');

SPRITES.bola = (cor='#f2762a')=>{ const w=60,h=60; let s='';

  s+=pth('M30 4 L30 52 M6 28 L54 28 M12 12 Q30 28 12 44 M48 12 Q30 28 48 44','none',3);
  return {w,h,svg:s}; };
SPRITES.sofa = (cor='#d9585f')=>{ const w=210,h=120; let s='';

  s+=rr(20,20,170,40,14,shade(cor,10)); s+=rr(20,55,170,55,14,cor);

  const livros=(y)=>{ let r=''; const cores=['#e14f4f','#4a6fd6','#3ecf8e','#f2b544']; let x=14;

  s+=livros(15); s+=livros(70); s+=livros(125);

SPRITES.luminaria = ()=>{ const w=70,h=140; let s='';

SPRITES.mochila = ()=>{ const w=70,h=94; let s='';

SPRITES.controle = ()=>{ const w=60,h=36; let s='';
  s+=pth('M8 8 Q0 8 0 20 Q0 34 12 34 L20 26 L40 26 L48 34 Q60 34 60 20 Q60 8 52 8 Z','#33303f');
  s+=ci(16,18,4,'#e14f4f'); s+=ci(28,18,4,'#f2b544'); s+=ci(44,15,3,'#4a6fd6'); s+=ci(44,23,3,'#3ecf8e');
  return {w,h,svg:s}; };
SPRITES.fogao = ()=>{ const w=130,h=120; let s='';

const app = document.getElementById('app');

function embaralhar(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function gerarOpcoes(correta){
  const outras = embaralhar(BANCO_PREPOSICOES.filter(p=>p!==correta)).slice(0,3);
  return embaralhar([correta, ...outras]);
}

const ORDEM_CATEGORIAS = ['quarto','sala','cozinha','banheiro','escritorio'];

function montarRodadaCategoria(categoria){
  const variantes = CATEGORIAS[categoria];
  const cena = variantes[Math.floor(Math.random()*variantes.length)];
  const pergunta = cena.perguntas[Math.floor(Math.random()*cena.perguntas.length)];
  return { cena, pergunta };
}

function sortearSequencia(){
  return ORDEM_CATEGORIAS.map(cat => montarRodadaCategoria(cat));
}

/* ===================== FASE 1 ===================== */
function rodadaAtual(){
  return estado.sequencia[estado.indiceCena];
}
function cenaAtual(){
  return rodadaAtual().cena;
}

function renderCenaHTML(cena){
  if(cena.foto){
    const aspecto = cena.aspecto || (4/3);
    return `<div class="scene-room scene-foto" style="aspect-ratio:${aspecto}; background-image:url('${cena.imagem}');">
    </div>`;
  }
  const LARGURA = 800, ALTURA = 600, DIVISA = 330;
  const parede = cena.cores[0], piso = cena.cores[1];
  let sprites = '';
  cena.itens.forEach(it=>{
    const gerador = SPRITES[it.tipo];
    if(!gerador){ return; }
    const {w,h,svg} = gerador(it.cor);
    const escala = it.escala || 1;
    const cx = (it.left/100)*LARGURA, cy = (it.top/100)*ALTURA;
    const gx = cx - (w*escala)/2, gy = cy - (h*escala)/2;
    sprites += `<g transform="translate(${gx.toFixed(1)},${gy.toFixed(1)}) scale(${escala})"><g class="sprite-inner" data-id="${it.id}">${svg}</g></g>`;
  });
  const fundo = `
    <defs>
      <pattern id="padraoParede" width="72" height="${ALTURA}" patternUnits="userSpaceOnUse">
        <rect width="72" height="${ALTURA}" fill="${parede}"/>
        <rect width="34" height="${ALTURA}" fill="${shade(parede,-5)}"/>
      </pattern>
      <pattern id="padraoPiso" width="${LARGURA}" height="28" patternUnits="userSpaceOnUse">
        <rect width="${LARGURA}" height="28" fill="${piso}"/>
        <line x1="0" y1="27" x2="${LARGURA}" y2="27" stroke="${shade(piso,-15)}" stroke-width="2"/>
      </pattern>
      <linearGradient id="luzAmbiente" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
        <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="${LARGURA}" height="${DIVISA}" fill="url(#padraoParede)"/>
    <rect x="0" y="${DIVISA}" width="${LARGURA}" height="${ALTURA-DIVISA}" fill="url(#padraoPiso)"/>
    <rect x="0" y="${DIVISA-6}" width="${LARGURA}" height="6" fill="${shade(piso,-30)}"/>
    <rect x="0" y="0" width="${LARGURA}" height="${ALTURA}" fill="url(#luzAmbiente)"/>
  `;
  return `<div class="scene-room">
    <svg class="scene-svg" viewBox="0 0 ${LARGURA} ${ALTURA}" preserveAspectRatio="xMidYMid slice">${fundo}${sprites}</svg>
  </div>`;
}

function renderFase1(){
  const { cena, pergunta } = rodadaAtual();
  const partes = pergunta.texto.split('{b}');
  app.innerHTML = `
    <div class="topbar">
      <div class="chip">Fase 1 · Cenário ${estado.indiceCena+1}/5</div>
      <div class="chip">✅ ${estado.acertos}/${estado.total}</div>
    </div>
    <div class="cena-titulo">${cena.emojiTitulo} ${cena.titulo}</div>
    ${renderCenaHTML(cena)}
    <div class="caixa-pergunta">
      <div class="progresso">Cenário ${estado.indiceCena+1} de ${estado.sequencia.length}</div>
      <div class="frase" id="frase">${partes[0]}<span class="lacuna" id="lacuna">_____</span>${partes[1]}</div>
      <div class="opcoes" id="opcoes"></div>
      <div class="rodape-pergunta" id="rodape"></div>
    </div>
    <div class="voltar-menu" id="voltarMenu">← Sair para o menu</div>
  `;
  montarOpcoes(pergunta);
  document.getElementById('voltarMenu').onclick = telaMenu;
}

function montarOpcoes(pergunta){
  const opcoesDiv = document.getElementById('opcoes');
  const opcoes = gerarOpcoes(pergunta.resposta);
  opcoesDiv.innerHTML = opcoes.map(op=>`<button class="opcao" data-op="${op}">${op}</button>`).join('');
  document.querySelectorAll('.opcao').forEach(btn=>{
    btn.onclick = ()=> responder(btn, pergunta);
  });
}

function responder(btnClicado, pergunta){
  const todos = document.querySelectorAll('.opcao');
  const correta = pergunta.resposta;
  const escolhida = btnClicado.dataset.op;
  todos.forEach(b=>b.disabled=true);
  const lacuna = document.getElementById('lacuna');
  estado.total++;
  if(escolhida === correta){
    btnClicado.classList.add('certa');
    lacuna.textContent = correta;
    lacuna.classList.add('certo');
    estado.acertos++;
  } else {
    btnClicado.classList.add('errada');
    lacuna.textContent = escolhida;
    lacuna.classList.add('errado');
    todos.forEach(b=>{ if(b.dataset.op===correta) b.classList.add('certa'); });
  }
  document.querySelectorAll('.chip')[1].textContent = `✅ ${estado.acertos}/${estado.total}`;
  const rodape = document.getElementById('rodape');
  rodape.innerHTML = `<button class="btn btn-laranja" id="btnProximo">Próxima ▶</button>`;
  document.getElementById('btnProximo').onclick = avancarPergunta;
}

function avancarPergunta(){
  estado.indiceCena++;
  if(estado.indiceCena >= estado.sequencia.length){
    telaResultado();
    return;
  }
  if(estado.fase===1){ renderFase1(); } else { renderFase2Observar(); }
}

    const numEl = document.getElementById('timerNum');
    const fillEl = document.getElementById('barraFill');
    if(numEl) numEl.textContent = estado.tempoRestante+'s';
    if(fillEl) fillEl.style.width = Math.max(0,(estado.tempoRestante/total*100))+'%';
    if(estado.tempoRestante<=0){
      clearInterval(estado.timerId);
      renderFase2Pergunta();
    }
  },1000);
}

function renderFase2Pergunta(){
  const { cena, pergunta } = rodadaAtual();
  const partes = pergunta.texto.split('{b}');
  app.innerHTML = `
    <div class="topbar">
      <div class="chip">Fase 2 · Cenário ${estado.indiceCena+1}/5</div>
      <div class="chip">✅ ${estado.acertos}/${estado.total}</div>
    </div>
    <div class="scene-blocked">
      <span class="emoji-grande">🧠💭</span>
      <p>Lembre-se da imagem que você acabou de ver!</p>
    </div>
    <div class="caixa-pergunta">
      <div class="progresso">Cenário ${estado.indiceCena+1} de ${estado.sequencia.length}</div>
      <div class="frase" id="frase">${partes[0]}<span class="lacuna" id="lacuna">_____</span>${partes[1]}</div>
      <div class="opcoes" id="opcoes"></div>
      <div class="rodape-pergunta" id="rodape"></div>
    </div>
    <div class="voltar-menu" id="voltarMenu">← Sair para o menu</div>
  `;
  montarOpcoes(pergunta);
  document.getElementById('voltarMenu').onclick = telaMenu;
}

/* ===================== RESULTADO ===================== */
function telaResultado(){
  const pct = estado.total>0 ? Math.round((estado.acertos/estado.total)*100) : 0;
  let emoji, msg;
  if(pct>=90){emoji='🏆'; msg='Excelente! Domínio completo das preposições de lugar.';}
  else if(pct>=70){emoji='🌟'; msg='Muito bom! Continue praticando para aperfeiçoar.';}
  else if(pct>=50){emoji='👍'; msg='Bom trabalho! Vale revisar as preposições com mais atenção.';}
  else {emoji='💪'; msg='Vamos praticar mais um pouco? A repetição ajuda a fixar o conteúdo.';}

  app.innerHTML = `
    <div class="resultado">
      <span class="emoji-grande">${emoji}</span>
      <h2>Fase ${estado.fase} concluída!</h2>
      <div class="placar">${estado.acertos} de ${estado.total} acertos (${pct}%)</div>
      <div class="mensagem">${msg}</div>
      <div class="acoes-final">
        <button class="btn btn-primario" id="btnJogarNovamente">Jogar esta fase novamente</button>
        <button class="btn btn-secundario" id="btnMenu">Menu principal</button>
      </div>
    </div>
  `;
  document.getElementById('btnJogarNovamente').onclick = ()=>{
    const faseSalva = estado.fase;
    const tempoSalvo = estado.tempoEscolhido;
    estado = {fase:faseSalva, tempoEscolhido:tempoSalvo, indiceCena:0, acertos:0, total:0, timerId:null, tempoRestante:0, sequencia:[]};
    iniciarCena();
  };
  document.getElementById('btnMenu').onclick = telaMenu;
}

/* ===================== INÍCIO ===================== */
telaMenu();
</script>
</body>
</html>
