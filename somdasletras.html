<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sons das Letras 🎵</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(160deg, #1a1a6e 0%, #4a0080 60%, #8e0060 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      background: #fff;
      border-radius: 32px;
      padding: 20px 18px 26px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 28px 70px rgba(0,0,0,.35);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .game-title {
      font-size: clamp(20px,4.5vw,28px);
      font-weight: 900;
      color: #4a0080;
      margin-bottom: 8px;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 26px;
      margin-bottom: 10px;
    }

    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 900; color: #4a0080; line-height: 1; }
    .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    .progress-wrap {
      width: 100%; height: 10px;
      background: #ede7f6;
      border-radius: 999px;
      margin-bottom: 18px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg,#7b1fa2,#e91e8c);
      border-radius: 999px;
      transition: width .5s ease;
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp .4s ease; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .letter-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .letter-circle {
      width: clamp(90px,20vw,118px);
      height: clamp(90px,20vw,118px);
      border-radius: 50%;
      background: linear-gradient(135deg,#f5a623,#f76b1c);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(247,107,28,.4);
      position: relative;
    }

    .big-letter {
      font-size: clamp(54px,13vw,76px);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 3px 8px rgba(0,0,0,.2);
    }

    .letter-circle.speaking::before,
    .letter-circle.speaking::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid #f5a623;
      animation: ringPulse 1.2s ease-out infinite;
    }
    .letter-circle.speaking::after { animation-delay: .5s; }

    @keyframes ringPulse {
      0%   { opacity:.8; transform:scale(1); }
      100% { opacity:0;  transform:scale(1.6); }
    }

    .sound-btn {
      width: clamp(54px,13vw,68px);
      height: clamp(54px,13vw,68px);
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg,#7b1fa2,#4a0080);
      color: #fff;
      font-size: clamp(24px,6vw,30px);
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(74,0,128,.4);
      transition: transform .12s, box-shadow .12s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      top: 0;
    }
    .sound-btn:active { top: 3px; box-shadow: 0 2px 8px rgba(74,0,128,.3); }

    .phoneme-hint {
      font-size: clamp(16px,4vw,20px);
      font-weight: 900;
      color: #f76b1c;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .instruction {
      font-size: clamp(14px,3.5vw,17px);
      color: #555;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .instruction strong { color: #4a0080; }

    .img-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2vw, 14px);
      margin-bottom: 16px;
    }

    .img-card {
      border: 4px solid #e0d4f0;
      border-radius: 18px;
      background: #faf7ff;
      padding: 10px 6px 8px;
      cursor: pointer;
      transition: transform .15s, border-color .15s, background .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      box-shadow: 0 3px 8px rgba(0,0,0,.06);
    }
    .img-card:hover:not(.done) {
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(74,0,128,.18);
    }

    .img-card .emoji {
      font-size: clamp(42px,11vw,58px);
      line-height: 1;
    }

    .img-card .word-lbl {
      font-size: clamp(10px,2.5vw,13px);
      font-weight: 900;
      color: #555;
      letter-spacing: .5px;
    }

    .img-card.selected {
      border-color: #7b1fa2;
      background: #ede7f6;
      box-shadow: 0 0 0 3px rgba(123,31,162,.25), 0 6px 18px rgba(74,0,128,.2);
      transform: scale(1.05);
    }

    .img-card .result-icon {
      display: none;
      position: absolute;
      top: 5px; right: 7px;
      font-size: 20px;
      line-height: 1;
    }

    .img-card.res-correct {
      border-color: #2e7d32;
      background: #e8f5e9;
      animation: popIn .4s ease;
    }
    .img-card.res-correct .result-icon { display: block; }
    .img-card.res-correct .result-icon::before { content:'✅'; }

    .img-card.res-wrong {
      border-color: #c62828;
      background: #ffebee;
      animation: shakeCard .4s ease;
    }
    .img-card.res-wrong .result-icon { display: block; }
    .img-card.res-wrong .result-icon::before { content:'❌'; }

    .img-card.res-missed {
      border-color: #f57f17;
      background: #fff8e1;
    }
    .img-card.res-missed .result-icon { display: block; }
    .img-card.res-missed .result-icon::before { content:'💡'; }

    .img-card.done { cursor: default; transform: none !important; }

    @keyframes popIn {
      0%  { transform: scale(.85); }
      60% { transform: scale(1.08); }
      100%{ transform: scale(1); }
    }
    @keyframes shakeCard {
      0%,100%{ transform:translateX(0); }
      25%    { transform:translateX(-7px); }
      75%    { transform:translateX(7px); }
    }

    .round-feedback {
      font-size: clamp(18px,4.5vw,22px);
      font-weight: 900;
      min-height: 30px;
      margin-bottom: 10px;
    }
    .round-feedback.ok  { color: #2e7d32; }
    .round-feedback.partial { color: #e65100; }
    .round-feedback.err { color: #c62828; }

    .btn {
      border: none;
      padding: 13px 34px;
      font-size: clamp(16px,4vw,20px);
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      transition: transform .12s, box-shadow .12s;
      box-shadow: 0 6px 0 rgba(0,0,0,.2);
      position: relative; top: 0;
    }
    .btn:active { top:4px; box-shadow:0 2px 0 rgba(0,0,0,.2); }
    .btn:disabled { opacity:.4; cursor:not-allowed; top:0; box-shadow:0 6px 0 rgba(0,0,0,.1); }

    .btn-confirm {
      background: linear-gradient(135deg,#7b1fa2,#4a0080);
      color: #fff;
      min-width: 200px;
      margin-top: 2px;
    }

    .btn-next {
      background: linear-gradient(135deg,#1b5e20,#388e3c);
      color: #fff;
      display: none;
      min-width: 200px;
      margin-top: 10px;
    }

    .btn-restart {
      background: linear-gradient(135deg,#c62828,#b71c1c);
      color: #fff;
      min-width: 200px;
      margin-top: 8px;
    }

    .end-emoji  { font-size: 80px; margin: 12px 0 6px; }
    .end-title  { font-size: clamp(24px,6vw,32px); font-weight:900; color:#4a0080; margin-bottom:8px; }
    .end-score  { font-size: clamp(16px,4vw,20px); color:#555; margin-bottom:6px; }
    .end-stars  { font-size: 40px; margin-bottom: 18px; }

    .score-breakdown {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .score-item {
      background: #f3e5f5;
      border-radius: 16px;
      padding: 10px 16px;
    }
    .score-item .si-val { font-size: 28px; font-weight:900; color:#4a0080; }
    .score-item .si-lbl { font-size: 11px; color:#888; }

    .confetti-layer {
      position:fixed; inset:0;
      pointer-events:none; z-index:9999;
      overflow:hidden;
    }
    .cp {
      position:absolute; top:-14px;
      border-radius:3px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform:translateY(105vh) rotate(720deg); opacity:0; }
    }

    @media (max-width: 380px) {
      .img-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .img-card { padding: 7px 4px 6px; border-radius: 14px; }
    }
  </style>
</head>
<body>

<div class="confetti-layer" id="confettiLayer"></div>

<div class="card">

  <div class="game-title">🎵 Sons das Letras 🎵</div>

  <div class="status-bar">
    <div class="stat">
      <div class="stat-value" id="scoreVal">0</div>
      <div class="stat-label">⭐ Pontos</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="roundNum">1 / 17</div>
      <div class="stat-label">🔤 Rodada</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="perfectVal">0</div>
      <div class="stat-label">🌟 Perfeitas</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="screen active" id="screenGame">

    <div class="letter-row">
      <div class="letter-circle" id="letterCircle">
        <div class="big-letter" id="bigLetter">A</div>
      </div>
      <button class="sound-btn" id="soundBtn" onclick="playSound()" title="Ouvir o som">🔊</button>
    </div>

    <div class="phoneme-hint" id="phonemeHint">/ a /</div>

    <div class="instruction" id="instruction">
      Toque em todas as imagens que começam com o som de <strong id="instrLetter">A</strong>
    </div>

    <div class="img-grid" id="imgGrid"></div>

    <div class="round-feedback" id="roundFeedback"></div>

    <button class="btn btn-confirm" id="btnConfirm" onclick="confirmSelection()" disabled>
      Confirmar ✓
    </button>
    <br/>
    <button class="btn btn-next" id="btnNext" onclick="nextRound()">
      Próxima letra ➡️
    </button>

  </div>

  <div class="screen" id="screenEnd">
    <div class="end-emoji">🏆</div>
    <div class="end-title">Parabéns! Você terminou!</div>
    <div class="end-stars" id="endStars">⭐⭐⭐</div>

    <div class="score-breakdown">
      <div class="score-item">
        <div class="si-val" id="endScore">0</div>
        <div class="si-lbl">Pontos totais</div>
      </div>
      <div class="score-item">
        <div class="si-val" id="endPerfect">0</div>
        <div class="si-lbl">🌟 Rodadas perfeitas</div>
      </div>
    </div>

    <div class="end-score" id="endMsg"></div>
    <button class="btn btn-restart" onclick="restartGame()">Jogar de novo! 🔄</button>
  </div>

</div>

  },
  {
    letter:"E", keyEmoji:"🐘", keyWord:"ELEFANTE",
    phoneme:"E",
    correct:[
      {emoji:"🐘", word:"ELEFANTE"},
      {emoji:"⭐", word:"ESTRELA"},

    ],
    wrong:[

      {emoji:"✈️", word:"AVIÃO"},
    ]
  },
  {
    letter:"I", keyEmoji:"🏝️", keyWord:"ILHA",
    phoneme:"I",

    ],

  {

      {emoji:"👗", word:"VESTIDO"},
    ],

      {emoji:"🦁", word:"LEÃO"},
      {emoji:"🥚", word:"OVO"},
      {emoji:"☀️", word:"SOL"},
    ]
  },
];

let deck = [], idx = 0, score = 0, perfectRounds = 0;
let confirmed = false;
let ttsVoices = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function show(id) {
  ["screenGame","screenEnd"].forEach(s=>{
    const el = document.getElementById(s);
    el.classList.remove("active");
    el.style.display="";
  });
  const t = document.getElementById(id);
  t.style.display="block";
  void t.offsetWidth;
  t.classList.add("active");
}

function loadVoices() {
  ttsVoices = window.speechSynthesis.getVoices();
}
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function speakPhoneme(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang   = 'pt-BR';
  utt.rate   = 0.55;
  utt.pitch  = 1.0;
  utt.volume = 1;
  const ptVoice = ttsVoices.find(v =>
    v.lang === 'pt-BR' || v.lang === 'pt_BR' || v.lang.startsWith('pt')
  );
  if (ptVoice) utt.voice = ptVoice;
  const circle = document.getElementById('letterCircle');
  circle.classList.add('speaking');
  utt.onend  = () => circle.classList.remove('speaking');
  utt.onerror = () => circle.classList.remove('speaking');
  window.speechSynthesis.speak(utt);
}

function playSound() {
  speakPhoneme(deck[idx].phoneme);
}

function restartGame() {
  deck = shuffle(ROUNDS);
  idx = 0; score = 0; perfectRounds = 0;
  updateHeader();
  loadRound();
  show("screenGame");
}

function loadRound() {
  confirmed = false;
  const round = deck[idx];

  document.getElementById('bigLetter').textContent = round.letter;
  document.getElementById('instrLetter').textContent = round.letter;
  document.getElementById('phonemeHint').textContent = `/ ${round.phoneme.toLowerCase()} /`;
  document.getElementById('roundFeedback').textContent = '';
  document.getElementById('roundFeedback').className = 'round-feedback';
  document.getElementById('btnConfirm').style.display = 'inline-block';
  document.getElementById('btnConfirm').disabled = true;
  document.getElementById('btnNext').style.display = 'none';

  const cards = shuffle([
    ...round.correct.map(c => ({...c, correct:true})),
    ...round.wrong.map(w => ({...w, correct:false})),
  ]);

  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '';

  cards.forEach((item) => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.dataset.correct = item.correct ? '1' : '0';
    card.dataset.selected = '0';
    card.innerHTML = `
      <span class="emoji">${item.emoji}</span>
      <span class="result-icon"></span>
    `;
    card.addEventListener('click', () => toggleCard(card));
    grid.appendChild(card);
  });

  updateHeader();
  setTimeout(() => speakPhoneme(round.phoneme), 350);
}

function toggleCard(card) {
  if (confirmed) return;
  const isSelected = card.dataset.selected === '1';
  card.dataset.selected = isSelected ? '0' : '1';
  card.classList.toggle('selected', !isSelected);
  const anySelected = document.querySelectorAll('.img-card[data-selected="1"]').length > 0;
  document.getElementById('btnConfirm').disabled = !anySelected;
}

function confirmSelection() {
  if (confirmed) return;
  confirmed = true;
  window.speechSynthesis.cancel();

  const cards = document.querySelectorAll('.img-card');
  let hits = 0, falseAlarms = 0, misses = 0;

  cards.forEach(card => {
    const correct  = card.dataset.correct  === '1';
    const selected = card.dataset.selected === '1';
    card.classList.add('done');
    card.classList.remove('selected');

    if (correct && selected)  { card.classList.add('res-correct'); hits++; }
    if (!correct && selected) { card.classList.add('res-wrong');   falseAlarms++; }
    if (correct && !selected) { card.classList.add('res-missed');  misses++; }
  });

  const roundScore = Math.max(0, hits * 4 - falseAlarms * 2);
  score += roundScore;
  const perfect = (hits === 3 && falseAlarms === 0);
  if (perfect) perfectRounds++;

  updateHeader();

  const fb = document.getElementById('roundFeedback');
  if (perfect) {
    fb.textContent = '🌟 Perfeito! Você acertou tudo!';
    fb.className = 'round-feedback ok';
    launchConfetti();
  } else if (hits > 0 && falseAlarms === 0) {
    fb.textContent = hits === 2 ? '😊 Quase! Faltou uma imagem.' : '💪 Continue tentando!';
    fb.className = 'round-feedback partial';
  } else if (hits > 0) {
    fb.textContent = `✅ ${hits} certa${hits>1?'s':''}, ❌ ${falseAlarms} errada${falseAlarms>1?'s':''}`;
    fb.className = 'round-feedback partial';
  } else {
    fb.textContent = '💪 Tente de novo na próxima!';
    fb.className = 'round-feedback err';
  }

  document.getElementById('btnConfirm').style.display = 'none';
  setTimeout(() => {
    document.getElementById('btnNext').style.display = 'inline-block';
  }, 1400);
}

function nextRound() {
  idx++;
  if (idx >= deck.length) {
    showEnd();
    return;
  }
  loadRound();
  document.querySelector('.card').scrollIntoView({behavior:'smooth', block:'start'});
}

function showEnd() {
  const maxScore = deck.length * 12;
  const pct = score / maxScore;
  const stars = pct >= .85 ? '⭐⭐⭐' : pct >= .55 ? '⭐⭐' : '⭐';
  const msgs = [
    'Uau! Você é incrível! Continue assim! 🎉',
    'Muito bem! Você está aprendendo! 😄',
    'Bom trabalho! Pratique mais e você chega lá! 💪'
  ];
  const msg = pct >= .85 ? msgs[0] : pct >= .55 ? msgs[1] : msgs[2];

  document.getElementById('endStars').textContent   = stars;
  document.getElementById('endScore').textContent   = score;
  document.getElementById('endPerfect').textContent = perfectRounds;
  document.getElementById('endMsg').textContent     = msg;
  document.getElementById('progressFill').style.width = '100%';

  show('screenEnd');
  launchConfetti();
  setTimeout(launchConfetti, 700);
  setTimeout(launchConfetti, 1400);
}

function updateHeader() {
  document.getElementById('scoreVal').textContent   = score;
  document.getElementById('roundNum').textContent   = `${idx+1} / ${deck.length}`;
  document.getElementById('perfectVal').textContent = perfectRounds;
  document.getElementById('progressFill').style.width = ((idx / deck.length) * 100) + '%';
}

function launchConfetti() {
  const layer = document.getElementById('confettiLayer');
  const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e91e8c','#1abc9c'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'cp';
    const size = Math.random()*10+6;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${Math.random()*2+1.8}s;
      animation-delay:${Math.random()*.5}s;
    `;
    layer.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}

restartGame();
</script>
</body>
</html>
